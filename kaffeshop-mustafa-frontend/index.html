<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Kaffeshop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>Kaffeshop Produkter</h1>
      <button class="btn btn-primary" id="btnLoad">Ladda produkter</button>
    </header>

    <div class="filter-wrapper">
      <select id="filterCat">
        <option value="">Alla kategorier</option>
      </select>
    </div>

    <main class="grid">
      <section class="card">
        <h2>Produkter</h2>
        <div id="products" class="products"></div>
      </section>

      <section class="card">
        <h2>Lägg till produkt</h2>
        <input id="newName" placeholder="Namn" />
        <input id="newDesc" placeholder="Beskrivning" />
        <input id="newPrice" type="number" placeholder="Pris" />
        <input id="newStock" type="number" placeholder="Lager" />

        <div class="filter-wrapper">
          <select id="newCat">
            <option value="">Välj kategori</option>
          </select>
        </div>

        <button class="btn btn-primary" id="btnAdd">Lägg till</button>

        <h2>Visa order (JOIN)</h2>
        <p class="muted">Skriv ett <b>Order-ID</b> (bara siffror, t.ex. 5) och klicka hämta.</p>

        <div class="row">
          <input id="orderId" type="number" min="1" step="1" placeholder="Order-ID" />
          <button class="btn btn-primary" id="btnOrder">Hämta order</button>
        </div>

        <div id="orderResult" class="result"></div>

        <div class="footer-note">
          Backend: <a href="http://localhost:3000" target="_blank" rel="noreferrer">http://localhost:3000</a>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
